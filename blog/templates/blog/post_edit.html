{% extends 'blog/base.html' %}

{% block content %}
     {% if form.instance.pk %}
         <h2>Modifica Post</h2>
     {% else %}
         <h2>Nuovo Post</h2>
     {% endif %}

     <form method="POST" class="post-form" enctype="multipart/form-data">{% csrf_token %}
         {{ form.as_p }}
         
         <button type="submit" class="save btn btn-default">
             {% if form.instance.pk %}
                 Salva
             {% else %}
                 Pubblica
             {% endif %}
         </button>
     </form>
{% endblock %}
